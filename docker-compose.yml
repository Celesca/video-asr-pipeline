version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: borntodev-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: borntodev_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: borntodev-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/borntodev_db
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./videos:/app/videos
      - ./texts:/app/texts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: borntodev-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
